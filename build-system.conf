#!/bin/bash

## Basic configuration
BUILD_HOST_FQDN=$(hostname -f)

## Path Configuration

JDKPATH="$CWD/jdk"
DLPATH="$CWD/downloads"
BLDPATH="$CWD/build"
BINPATH="$CWD/bin"
AUTHPATH="$CWD/authelia"
TPLPATH="$CWD/templates"
LOGPATH="$CWD/logs"
WWWPATH="$CWD/www"
SEMAPHOREPATH="$CWD/semaphore"

## Secrets Configuration
# Authelia secrets will be automatically generated during setup if left blank

JWT_SECRET=""
SESSION_SECRET=""
STORAGE_SECRET=""

# Authelia user account
AUTH_USER=""

USER_PASSWORD=""
PASS_HASH=""


SEMAPHORE_DB="$SEMAPHOREPATH/database.sqlite"

## URL Configuration

# Get Caddy web server
CADDY_URL=https://github.com/caddyserver/caddy/releases/download/v2.11.4/caddy_2.11.4_linux_amd64.tar.gz
CADDY_TARBALL=$(basename $CADDY_URL)

# Get Homer dashboard
HOMER_URL=https://github.com/bastienwirtz/homer/releases/download/v26.4.2/homer.zip
HOMER_ZIP=$(basename $HOMER_URL)

# Get Authelia
AUTHELIA_URL=https://github.com/authelia/authelia/releases/download/v4.39.20/authelia-v4.39.20-linux-amd64.tar.gz
AUTHELIA_TARBALL=$(basename $AUTHELIA_URL)

# Get code-server
CS_URL=https://github.com/coder/code-server/releases/download/v4.126.0/code-server-4.126.0-linux-amd64.tar.gz
CS_TARBALL=$(basename $CS_URL)

# Get Jenkins
JENKINS_URL=https://get.jenkins.io/war-stable/2.555.3/jenkins.war
JENKINS_TARBALL=$(basename $JENKINS_URL)

# Get JDK21
JDK21_URL=https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11%2B10/OpenJDK21U-jdk_x64_linux_hotspot_21.0.11_10.tar.gz
JDK21_TARBALL=$(basename $JDK21_URL)

# Get JDK17
JDK17_URL=https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.19%2B10/OpenJDK17U-jdk_x64_linux_hotspot_17.0.19_10.tar.gz
JDK17_TARBALL=$(basename $JDK17_URL)

# Get Semaphore
SEMAPHORE_URL=https://github.com/semaphoreui/semaphore/releases/download/v2.18.13/semaphore_2.18.13_linux_amd64.tar.gz
SEMAPHORE_TARBALL=$(basename $SEMAPHORE_URL)
SEMAPHORE_VERSION="2.18.13"
