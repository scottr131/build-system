#!/bin/bash

## Basic configuration
BUILD_HOST_FQDN=$(hostname -f)

## Path Configuration

JDKPATH="$CWD/jdk"
DLPATH="$CWD/downloads"
BLDPATH="$CWD/build"
BINPATH="$CWD/bin"
AUTHPATH="$CWD/authelia"
TPLPATH="$CWD/templates"
LOGPATH="$CWD/logs"
WWWPATH="$CWD/www"
RDECK_BASE="$CWD/rundeck"

## Secrets Configuration
# Authelia secrets will be automatically generated during setup if left blank

JWT_SECRET=""
SESSION_SECRET=""
STORAGE_SECRET=""

# Authelia user account
AUTH_USER=""

USER_PASSWORD=""
PASS_HASH=""


## URL Configuration

# Get Caddy web server
CADDY_URL=https://github.com/caddyserver/caddy/releases/download/v2.11.2/caddy_2.11.2_linux_amd64.tar.gz
CADDY_TARBALL=$(basename $CADDY_URL)

# Get Homer dashboard
HOMER_URL=https://github.com/bastienwirtz/homer/releases/download/v26.4.2/homer.zip
HOMER_ZIP=$(basename $HOMER_URL)

# Get Authelia
AUTHELIA_URL=https://github.com/authelia/authelia/releases/download/v4.39.19/authelia-v4.39.19-linux-amd64.tar.gz
AUTHELIA_TARBALL=$(basename $AUTHELIA_URL)

# Get code-server
CS_URL=https://github.com/coder/code-server/releases/download/v4.117.0/code-server-4.117.0-linux-amd64.tar.gz
CS_TARBALL=$(basename $CS_URL)

# Get Jenkins
JENKINS_URL=https://get.jenkins.io/war-stable/2.555.1/jenkins.war
JENKINS_TARBALL=$(basename $JENKINS_URL)

# Get JDK17
JDK21_URL=https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11%2B10/OpenJDK21U-jdk_x64_linux_hotspot_21.0.11_10.tar.gz
JDK21_TARBALL=$(basename $JDK21_URL)

# Get JDK17
JDK17_URL=https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.19%2B10/OpenJDK17U-jdk_x64_linux_hotspot_17.0.19_10.tar.gz
JDK17_TARBALL=$(basename $JDK17_URL)

# Get JDK11
JDK11_URL=https://github.com/adoptium/temurin11-binaries/releases/download/jdk-11.0.31%2B11/OpenJDK11U-jdk_x64_linux_hotspot_11.0.31_11.tar.gz
JDK11_TARBALL=$(basename $JDK11_URL)

# Get Rundeck source
RUNDECK_URL=https://github.com/rundeck/rundeck/archive/refs/tags/v5.17.0.tar.gz
RUNDECK_SRC_TARBALL=$(basename $RUNDECK_URL)
RDECK_VERSION="5.17.0"
